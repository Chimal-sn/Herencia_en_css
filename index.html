<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorador del Overworld</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">

</head>

<body>
    <header>
        <nav>
            <div class="logo">
                <img src="src/img/logo.png" alt="">
                <p>Atlas MC</p>
            </div>
            <hr>
            <div class="menu">
                <a href="#">Biomas</a>
                <a href="#">Criaturas</a>
                <a href="#">Bloques</a>
                <a href="#">Consejos</a>
            </div>
        </nav>
    </header>
    <main>
        <section class="hero">
            <div class="contenedorP_hero">
                <h1>Atlas del Mundo de Minecraft</h1>
                <p>Una enciclopedia para saber mas de Minecraft</p>
            </div>
            <div class="contenedoresS_hero">
                <div class="contenedors_hero">
                    <img src="src/img/icon_t.png" alt="">
                    <h2>Overworld</h2>
                    <p>Superficie principal</p>
                </div>
                <div class="contenedors_hero">
                    <img src="src/img/icon_d.png" alt="">
                    <h2>Cuevas</h2>
                    <p>Mundo subterraneo</p>
                </div>
                <div class="contenedors_hero">
                    <img src="src/img/icon_c.png" alt="">
                    <h2>Mobs</h2>
                    <p>Criaturas hostiles</p>
                </div>
            </div>
        </section>

        <section class="section_overworld">
            <div class="titulo_overwolrd">
                <h2>Overworld</h2>
                <p>Dimensión principal</p>
            </div>
            <hr>
            <div class="contenedor_informacion">
                <div class="p_informacion">
                    <img src="src/img/fondo_overworld.png" alt="">
                </div>

            </div>
        </section>

    </main>
    <footer></footer>

</body>

</html>
